# Staging wrangler config for Issue #24 validation.
# Copy to wrangler.staging.toml and fill in values before deploying.
#
# Deploy:
#   cd server
#   npx wrangler deploy --config wrangler.staging.toml --var SYNC_TOKEN:YOUR_TOKEN
#
# Tear down after validation:
#   npx wrangler delete --config wrangler.staging.toml

name = "yaos-staging-CHANGEME"
main = "src/index.ts"
compatibility_date = "2026-03-02"

[[durable_objects.bindings]]
name = "YAOS_SYNC"
class_name = "VaultSyncServer"

[[durable_objects.bindings]]
name = "YAOS_CONFIG"
class_name = "ServerConfig"

[[migrations]]
tag = "v1"
new_sqlite_classes = ["VaultSyncServer", "ServerConfig"]

[observability.logs]
enabled = true
